<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AnyBuddy – Find the right person for the right moment</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Inter',BlinkMacSystemFont,'Segoe UI',sans-serif;background:#d1d5db;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
#phone{width:390px;height:844px;background:#fafafa;border-radius:50px;overflow:hidden;box-shadow:0 50px 100px rgba(0,0,0,0.4),0 0 0 12px #111827,0 0 0 14px #374151;position:relative;display:flex;flex-direction:column}
#screen{flex:1;position:relative;overflow:hidden}
.view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;background:#fafafa}
.view::-webkit-scrollbar{display:none}
.view.enter{animation:slideIn .28s cubic-bezier(.4,0,.2,1) forwards}
.view.back{animation:slideBack .28s cubic-bezier(.4,0,.2,1) forwards}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideBack{from{transform:translateX(-30%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Status bar */
.status{position:absolute;top:0;left:0;right:0;height:48px;display:flex;align-items:flex-start;justify-content:space-between;padding:16px 24px 0;font-size:12px;font-weight:700;z-index:50;pointer-events:none}

/* Gradient */
.grad{background:linear-gradient(135deg,#7C3AED,#EC4899)}
.grad-soft{background:linear-gradient(135deg,#ede9fe,#fce7f3)}
.grad-text{background:linear-gradient(135deg,#7C3AED,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Buttons */
.btn{display:block;width:100%;padding:16px 24px;border-radius:16px;border:none;font-size:16px;font-weight:600;cursor:pointer;text-align:center;transition:opacity .15s,transform .1s;font-family:inherit;letter-spacing:-.2px}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff}
.btn-p:hover{opacity:.92}
.btn-s{background:#f3f4f6;color:#374151}
.btn-s:hover{background:#e5e7eb}
.btn-ghost{background:transparent;color:rgba(255,255,255,.65);border:none;padding:14px 0;font-size:15px;font-weight:500;cursor:pointer;width:100%;font-family:inherit}

/* Input */
.inp{width:100%;padding:14px 16px;border:2px solid #e5e7eb;border-radius:14px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;background:#fff;color:#111827}
.inp:focus{border-color:#7C3AED}
label{font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:8px}

/* Avatar circle */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;font-size:inherit}

/* Chip */
.chip{display:inline-flex;align-items:center;padding:7px 14px;border-radius:100px;font-size:13px;font-weight:600;border:2px solid #e5e7eb;background:#fff;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;font-family:inherit}
.chip:hover:not(.sel){border-color:#7C3AED;color:#7C3AED}
.chip.sel{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;border-color:transparent}

/* Activity card */
.act-card{border-radius:20px;border:2.5px solid #e5e7eb;padding:20px 12px;cursor:pointer;transition:all .2s;background:#fff;text-align:center;user-select:none}
.act-card:hover:not(.sel){border-color:#a78bfa}
.act-card.sel{border-color:#7C3AED;background:linear-gradient(135deg,#ede9fe,#fce7f3)}

/* Match badge */
.mbadge{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;border-radius:100px;padding:3px 10px;font-size:11px;font-weight:800;white-space:nowrap}

/* Profile card */
.pcard{background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07);cursor:pointer;transition:transform .18s}
.pcard:hover{transform:translateY(-2px)}

/* Tag pill */
.tag{background:#ede9fe;color:#7C3AED;font-size:12px;font-weight:700;border-radius:100px;padding:3px 10px;display:inline-block}
.tag-w{background:#fff;color:#7C3AED;font-size:13px;font-weight:700;border-radius:100px;padding:5px 14px;box-shadow:0 2px 8px rgba(124,58,237,.15)}

/* Chat bubbles */
.bme{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;border-radius:18px 18px 4px 18px;padding:10px 14px;max-width:76%;align-self:flex-end;font-size:14px;line-height:1.45;word-break:break-word}
.bthem{background:#f3f4f6;color:#111827;border-radius:18px 18px 18px 4px;padding:10px 14px;max-width:76%;align-self:flex-start;font-size:14px;line-height:1.45;word-break:break-word}

/* Bottom nav */
#nav{background:#fff;border-top:1px solid #f3f4f6;display:none;padding:0 0 16px}
#nav.show{display:flex}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 0 0;cursor:pointer;font-size:11px;font-weight:600;color:#9ca3af;border:none;background:none;font-family:inherit;transition:color .15s}
.nitem.act{color:#7C3AED}

/* Progress */
.ptrack{background:#e5e7eb;border-radius:100px;height:4px;flex:1}
.pfill{background:linear-gradient(135deg,#7C3AED,#EC4899);border-radius:100px;height:4px;transition:width .3s ease}

/* Location row */
.locrow{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:16px;padding:16px 18px;border:2px solid #e5e7eb;cursor:pointer;transition:all .15s;margin-bottom:10px;user-select:none}
.locrow.sel{border-color:#7C3AED}
.locrow span{font-size:15px;font-weight:600;color:#111827;transition:color .15s}
.locrow.sel span{color:#7C3AED}
.check{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#EC4899);display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Day cell */
.daycell{display:flex;flex-direction:column;align-items:center;padding:10px 4px;border-radius:14px;background:#fff;border:2px solid #e5e7eb;cursor:pointer;transition:all .15s;user-select:none}
.daycell.sel{background:linear-gradient(135deg,#7C3AED,#EC4899);border-color:transparent}
.daycell .dw{font-size:10px;font-weight:700;color:#9ca3af;margin-bottom:4px}
.daycell.sel .dw,.daycell.sel .dn,.daycell.sel .dm{color:rgba(255,255,255,.85)!important}
.daycell .dn{font-size:16px;font-weight:800;color:#111827}
.daycell .dm{font-size:9px;color:#9ca3af;margin-top:2px}

/* Gender btn */
.gbtn{flex:1;padding:13px 0;border-radius:13px;border:2px solid #e5e7eb;background:#fff;color:#374151;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.gbtn.sel{border-color:#7C3AED;background:#ede9fe;color:#7C3AED}

/* Slide dots */
.dot{height:8px;border-radius:100px;background:rgba(255,255,255,.35);cursor:pointer;transition:all .3s}
.dot.act{background:#fff}

/* Chat input area */
#chat-inp-area{background:#fff;border-top:1px solid #f3f4f6;display:flex;gap:10px;align-items:flex-end;padding:10px 16px 28px}
#chat-inp{flex:1;padding:11px 16px;border:2px solid #e5e7eb;border-radius:24px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;background:#f9fafb;resize:none}
#chat-inp:focus{border-color:#7C3AED}
#send-btn{width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s;background:linear-gradient(135deg,#7C3AED,#EC4899)}
#messages{display:flex;flex-direction:column;gap:10px;padding:16px;overflow-y:auto;flex:1;scrollbar-width:none}
#messages::-webkit-scrollbar{display:none}

/* Popover menu */
.popover{position:absolute;right:0;top:30px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:6px 0;min-width:160px;z-index:200}
.pop-item{padding:13px 18px;font-size:14px;font-weight:500;cursor:pointer;transition:background .1s}
.pop-item:hover{background:#f9fafb}

/* Utility */
.scroll-x{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.scroll-x::-webkit-scrollbar{display:none}
.sticky-btn{position:sticky;bottom:0;padding:12px 24px 32px;background:linear-gradient(to top,#fafafa 60%,transparent)}
.back-btn{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
</style>
</head>
<body>
<div id="phone">
  <div id="screen"></div>
  <nav id="nav">
    <button class="nitem act" data-nav="results" onclick="navTo('results')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="2.2"/><path d="M15 15l4 4" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      Discover
    </button>
    <button class="nitem" data-nav="chats" onclick="navTo('chats')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M18 3H4a2 2 0 00-2 2v10a2 2 0 002 2h3l3 3 3-3h3a2 2 0 002-2V5a2 2 0 00-2-2z" stroke="currentColor" stroke-width="2.2"/></svg>
      Messages
    </button>
    <button class="nitem" data-nav="myprofile" onclick="navTo('myprofile')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="4" stroke="currentColor" stroke-width="2.2"/><path d="M3 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      Profile
    </button>
  </nav>
</div>

<script>
/* ─── STATE ─── */
const S = {
  screen: 'splash',
  prev: null,
  activity: null,
  prefs: [],
  locations: [],
  dates: [],
  profile: null,
  chat: null,
  avatarIdx: 0,
  userName: '',
  gender: '',
  age: '',
  messages: [
    {me:false, text:"Hey! I saw you're also into indie concerts in Tel Aviv! 🎵", time:'2:30 PM'},
    {me:true,  text:"Yes!! I love indie music. Are you going to the Arctic Monkeys tribute?", time:'2:31 PM'},
    {me:false, text:"OMG YES 😊 I have two tickets and was looking for someone to go with!", time:'2:32 PM'},
    {me:true,  text:"That's amazing! I'd love to join. Which date?", time:'2:33 PM'},
    {me:false, text:"Are you going to the Radiohead tribute on Friday? 🎸", time:'2:35 PM'},
  ]
};

/* ─── DATA ─── */
const AVCOLORS = [
  'linear-gradient(135deg,#7C3AED,#EC4899)',
  'linear-gradient(135deg,#10b981,#06b6d4)',
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#8b5cf6,#EC4899)',
  'linear-gradient(135deg,#06b6d4,#7C3AED)',
  'linear-gradient(135deg,#ef4444,#f59e0b)',
];
const AVINIT = ['NO','MS','YK','RL','DG','AB'];

const ACTIVITIES = [
  {id:'concert',label:'Concert',emoji:'🎵'},
  {id:'hiking', label:'Hiking', emoji:'🏔️'},
  {id:'wellness',label:'Wellness',emoji:'🧘'},
  {id:'sports', label:'Sports', emoji:'⚽'},
  {id:'dining', label:'Dining', emoji:'🍽️'},
  {id:'travel', label:'Travel', emoji:'✈️'},
];
const GENRES  = ['Indie','Rock','Pop','Electronic','Jazz','Hip-Hop','R&B','Classical','Metal','Folk'];
const ARTISTS = ['Coldplay','Radiohead','Daft Punk','Beyoncé','Kendrick Lamar','Taylor Swift','The 1975','Arctic Monkeys','Billie Eilish','Frank Ocean'];
const HIKE_T  = ['Day hike','Multi-day','Trail run','Photography walk','Family hike'];
const DESTS   = ['Galil','Negev','Golan','Carmel','Dead Sea','Europe','SE Asia','Americas'];
const LOCS    = ['Tel Aviv','Jerusalem','Haifa','Beer Sheva','Eilat','Ramat Gan','Herzliya','London','Berlin','Barcelona'];
const PREFS_BY = {
  wellness:['Yoga','Meditation','Pilates','Gym','CrossFit','Swimming','Cycling','Running'],
  sports:  ['Football','Basketball','Tennis','Padel','Running','Cycling','Swimming','CrossFit'],
  dining:  ['Italian','Japanese','Mediterranean','Thai','Israeli','French','American','Vegan'],
  travel:  ['Backpacking','Luxury','Adventure','Cultural','Beach','City break','Road trip','Nature'],
};
const PROFILES = [
  {id:1,name:'Noa Oz',age:28,city:'Tel Aviv',bio:"Indie music lover & weekend hiker. Looking for someone to hit shows with ✨",match:97,tags:['Indie','Arctic Monkeys','Tel Aviv','Hiking'],av:0},
  {id:2,name:'Matan Shai',age:31,city:'Tel Aviv',bio:"Electronic music & good vibes. Daft Punk changed my life. Let's dance 🎧",match:91,tags:['Electronic','Daft Punk','Tel Aviv','Wellness'],av:1},
  {id:3,name:'Yael Katz',age:26,city:'Jerusalem',bio:"Classical meets indie. Always up for a spontaneous concert trip 🎻",match:88,tags:['Classical','Indie','Jerusalem','Photography'],av:2},
  {id:4,name:'Ron Levi',age:33,city:'Haifa',bio:"Rock and roll is a lifestyle not just music. Weekend warriors welcome 🤘",match:82,tags:['Rock','Metal','Haifa','Sports'],av:3},
  {id:5,name:'Dana Gal',age:29,city:'Tel Aviv',bio:"Jazz & coffee in the morning, concerts at night. Let's make memories ☕",match:79,tags:['Jazz','R&B','Tel Aviv','Dining'],av:4},
  {id:6,name:'Ariel Ben',age:27,city:'Tel Aviv',bio:"Pop music enthusiast & gym rat. Looking for a buddy for the next big show 🏋️",match:74,tags:['Pop','Beyoncé','Tel Aviv','Fitness'],av:5},
];
const CHATS_DATA = [
  {id:1,pid:0,last:"Are you going to the Radiohead tribute on Friday? 🎸",time:'2m ago',unread:2,shared:'Indie concerts • Tel Aviv'},
  {id:2,pid:1,last:"I found two tickets for the Daft Punk tribute!",time:'1h ago',unread:0,shared:'Electronic music • Tel Aviv'},
  {id:3,pid:4,last:"That jazz bar in Florentin is amazing btw",time:'3h ago',unread:1,shared:'Jazz • Tel Aviv'},
];

/* ─── HELPERS ─── */
const av = (idx, size=44) =>
  `<div class="av" style="width:${size}px;height:${size}px;background:${AVCOLORS[idx]};font-size:${size*.37}px">${AVINIT[idx]}</div>`;

const statusBar = (light=false) => {
  const c = light ? '#fff' : '#111827';
  return `<div class="status" style="color:${c}">
    <span>9:41</span>
    <span style="display:flex;gap:5px;align-items:center">
      <svg width="16" height="11" viewBox="0 0 16 11" fill="${c}"><rect x="0" y="3" width="3" height="8" rx="1"/><rect x="4" y="1" width="3" height="10" rx="1"/><rect x="8" y="0" width="3" height="11" rx="1"/><rect x="12" y="0" width="3" height="11" rx="1" opacity=".4"/></svg>
      <svg width="24" height="11" viewBox="0 0 24 11" fill="none"><rect x=".5" y=".5" width="20" height="10" rx="3.5" stroke="${c}" stroke-opacity=".35"/><rect x="2" y="2" width="15" height="7" rx="1.5" fill="${c}"/><path d="M22 4v3a1.5 1.5 0 000-3z" fill="${c}" fill-opacity=".35"/></svg>
    </span>
  </div>`;
};

const backBtn = (light=false, fn='goBack()') =>
  `<button class="back-btn" onclick="${fn}">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="${light?'#fff':'#111827'}" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  </button>`;

const qHeader = (step,total,title,backFn='goBack()') => `
  <div style="padding:52px 24px 0">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      ${backBtn(false,backFn)}
      <div class="ptrack"><div class="pfill" style="width:${(step/total)*100}%"></div></div>
      <span style="font-size:12px;font-weight:700;color:#9ca3af">${step}/${total}</span>
    </div>
    <h2 style="font-size:24px;font-weight:800;color:#111827;letter-spacing:-.4px;margin-bottom:4px">${title}</h2>
  </div>`;

const stickyBtn = (label, fn, disabled=false) =>
  `<div class="sticky-btn"><button class="btn btn-p" style="opacity:${disabled?.5:1}" onclick="${fn}">${label}</button></div>`;

/* ─── NAVIGATION ─── */
const NAV_SCREENS = ['results','chats','myprofile','profile','chat'];

function navigate(to, isBack=false) {
  S.prev = S.screen;
  S.screen = to;
  const scr = document.getElementById('screen');
  const view = document.createElement('div');
  view.className = `view ${isBack?'back':'enter'}`;
  view.innerHTML = SCREENS[to]();
  // remove old
  const old = scr.querySelector('.view');
  if(old) old.remove();
  scr.appendChild(view);
  // nav bar
  const nav = document.getElementById('nav');
  if(NAV_SCREENS.includes(to)){
    nav.classList.add('show');
    nav.querySelectorAll('.nitem').forEach(el=>{
      el.classList.toggle('act', el.dataset.nav===to || (el.dataset.nav==='results'&&['results','profile'].includes(to)));
    });
  } else {
    nav.classList.remove('show');
  }
  // post-render hooks
  if(to==='chat') initChat();
  if(to==='splash') setTimeout(()=>navigate('onboarding'),2200);
  if(to==='results') setTimeout(()=>scr.querySelector('.view').scrollTo(0,0),50);
}

function goBack(){
  if(S.prev) navigate(S.prev, true);
}

function navTo(sc){ navigate(sc); }

/* ─── SCREENS ─── */
const SCREENS = {

/* 1. SPLASH */
splash:()=>`
  <div style="height:100%;background:linear-gradient(160deg,#1e1b4b 0%,#4c1d95 50%,#7c2d92 100%);display:flex;flex-direction:column;align-items:center;justify-content:center">
    ${statusBar(true)}
    <div style="width:104px;height:104px;border-radius:30px;background:linear-gradient(135deg,#a78bfa,#f0abfc);display:flex;align-items:center;justify-content:center;box-shadow:0 20px 48px rgba(167,139,250,.55);margin-bottom:28px">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <ellipse cx="28" cy="20" rx="12" ry="12" fill="white" fill-opacity=".95"/>
        <circle cx="12" cy="38" r="7" fill="white" fill-opacity=".6"/>
        <circle cx="44" cy="36" r="8" fill="white" fill-opacity=".7"/>
        <line x1="20" y1="30" x2="12" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity=".7"/>
        <line x1="36" y1="29" x2="44" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-opacity=".7"/>
      </svg>
    </div>
    <h1 style="color:#fff;font-size:40px;font-weight:900;letter-spacing:-1.5px;margin-bottom:10px">AnyBuddy</h1>
    <p style="color:rgba(255,255,255,.7);font-size:15px;font-weight:400;text-align:center;padding:0 40px;line-height:1.5">Find the right person<br>for the right moment</p>
    <div style="display:flex;gap:8px;margin-top:64px">
      <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.9);animation:blink .8s ease-in-out infinite alternate"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.9);animation:blink .95s ease-in-out .15s infinite alternate"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.9);animation:blink 1.1s ease-in-out .3s infinite alternate"></div>
    </div>
    <style>@keyframes blink{from{opacity:.25;transform:scale(.8)}to{opacity:1;transform:scale(1.15)}}</style>
  </div>`,

/* 2. ONBOARDING */
onboarding:()=>{
  const SLIDES=[
    {emoji:'🎯',title:'Smart Matching',sub:'Answer a quick questionnaire and we match you with people who want to do the same thing, at the same time, near you.'},
    {emoji:'🤝',title:'Real Connections',sub:'No endless swiping. Meet people with shared interests, in your area, at the right time. It\'s that simple.'},
    {emoji:'🚀',title:'Do Life Together',sub:'Concerts, hikes, dining, travel — AnyBuddy connects you to your next great experience with the right person.'},
  ];
  if(!window._slide) window._slide=0;
  const s=SLIDES[window._slide];
  const bgs=['linear-gradient(160deg,#1e1b4b,#4c1d95,#7c2d92)','linear-gradient(160deg,#0f172a,#1e3a5f,#0e7490)','linear-gradient(160deg,#2d1b00,#7c2d12,#be123c)'];
  return `
    <div style="height:100%;background:${bgs[window._slide]};display:flex;flex-direction:column">
      ${statusBar(true)}
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 36px 0">
        <div style="font-size:84px;margin-bottom:36px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.3))">${s.emoji}</div>
        <h2 style="color:#fff;font-size:30px;font-weight:800;text-align:center;letter-spacing:-.5px;margin-bottom:16px">${s.title}</h2>
        <p style="color:rgba(255,255,255,.75);font-size:16px;text-align:center;line-height:1.65">${s.sub}</p>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;padding:32px 0 8px">
        ${SLIDES.map((_,i)=>`<div class="dot ${i===window._slide?'act':''}" style="width:${i===window._slide?28:8}px" onclick="setSlide(${i})"></div>`).join('')}
      </div>
      <div style="padding:0 24px 48px;display:flex;flex-direction:column;gap:10px">
        ${window._slide<2
          ? `<button class="btn" style="background:rgba(255,255,255,.22);color:#fff;border:2px solid rgba(255,255,255,.3);backdrop-filter:blur(10px)" onclick="nextSlide()">Next →</button>
             <button class="btn-ghost" onclick="navigate('signup')">Skip</button>`
          : `<button class="btn" style="background:#fff;color:#7C3AED" onclick="navigate('signup')">Get Started 🎉</button>`
        }
      </div>
    </div>`;
},

/* 3. SIGN UP */
signup:()=>`
  <div style="padding:52px 24px 40px">
    ${statusBar()}
    <div style="margin-bottom:28px">
      <h1 style="font-size:28px;font-weight:800;color:#111827;letter-spacing:-.5px;margin-bottom:6px">Create your profile</h1>
      <p style="color:#6b7280;font-size:15px">Just the basics — no dating profiles here</p>
    </div>
    <div style="margin-bottom:24px">
      <label>Choose your avatar</label>

/* ─── ACTION HANDLERS ─── */
function setSlide(i){ window._slide=i; navigate('onboarding'); }
function nextSlide(){ window._slide=Math.min((window._slide||0)+1,2); navigate('onboarding'); }

function selAv(i){
  S.avatarIdx=i;
  document.querySelectorAll('[id^="av-"]').forEach((el,idx)=>{
    el.style.borderColor=idx===i?'#7C3AED':'transparent';
  });
}

function selGender(g){
  S.gender=g;
  document.querySelectorAll('.gbtn').forEach(btn=>{
    btn.classList.toggle('sel', btn.textContent.trim()===g);
  });
  updSignup();
}

function updSignup(){
  const btn=document.getElementById('signup-btn');
  if(btn) btn.style.opacity=S.userName&&S.age&&S.gender?1:.5;
}

function selAct(id){
  S.activity=id;
  document.querySelectorAll('.act-card').forEach(el=>{
    const isMe=el.getAttribute('onclick')===`selAct('${id}')`;
    el.classList.toggle('sel',isMe);
    el.querySelector('div:last-child').style.color=isMe?'#7C3AED':'#111827';
  });
  document.querySelector('.sticky-btn .btn').style.opacity=1;
}

function togPref(item){
  const idx=S.prefs.indexOf(item);
  if(idx>-1) S.prefs.splice(idx,1); else S.prefs.push(item);
  document.querySelectorAll('.chip').forEach(el=>{
    if(el.textContent.trim()===item) el.classList.toggle('sel');
  });
}

function togLoc(loc){
  const idx=S.locations.indexOf(loc);
  if(idx>-1) S.locations.splice(idx,1); else S.locations.push(loc);
  // re-render just location rows for smoothness
  document.querySelectorAll('.locrow').forEach(row=>{
    const name=row.querySelector('span').textContent;
    if(name===loc){
      row.classList.toggle('sel');
      const right=row.children[1];
      if(S.locations.includes(loc)){
        right.outerHTML=`<div class="check"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
      } else {
        right.outerHTML=`<span style="color:#d1d5db;font-size:18px">+</span>`;
      }
    }
  });
  const btn=document.querySelector('.sticky-btn .btn');
  if(btn) btn.style.opacity=S.locations.length?1:.5;
}

function togDate(key){
  const idx=S.dates.indexOf(key);
  if(idx>-1) S.dates.splice(idx,1); else S.dates.push(key);
  document.querySelectorAll('.daycell').forEach(cell=>{
    if(cell.getAttribute('onclick')===`togDate('${key}')`){
      cell.classList.toggle('sel');
    }
  });
  // update count badge
  const old=document.querySelector('.date-info');
  if(old) old.remove();
  if(S.dates.length){
    const btn=document.querySelector('.btn.btn-p');
    if(btn){
      btn.style.opacity=1;
      const info=document.createElement('div');
      info.className='date-info';
      info.style.cssText='background:#ede9fe;border-radius:16px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px';
      info.innerHTML=`<span style="font-size:18px">📅</span><span style="font-size:14px;font-weight:700;color:#7C3AED">${S.dates.length} date${S.dates.length>1?'s':''} selected</span>`;
      btn.parentNode.insertBefore(info, btn);
    }
  }
}

function openProfile(id){
  S.profile=PROFILES.find(p=>p.id===id);
  navigate('profile');
}

function openChat(pidIdx){
  S.chat=PROFILES[pidIdx];
  navigate('chat');
}

function startChat(id){
  S.chat=PROFILES.find(p=>p.id===id)||PROFILES[0];
  setTimeout(()=>navigate('chat'),300);
}

/* Chat functions */
function initChat(){
  const msgs=document.getElementById('messages');
  if(msgs) msgs.scrollTop=msgs.scrollHeight;
}

function sendMsg(){
  const inp=document.getElementById('chat-inp');
  if(!inp||!inp.value.trim()) return;
  const text=inp.value.trim();
  inp.value='';
  const msgs=document.getElementById('messages');
  const time=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  S.messages.push({me:true,text,time});
  const div=document.createElement('div');
  div.style.cssText='display:flex;flex-direction:column;align-items:flex-end';
  div.innerHTML=`<div class="bme">${text}</div><span style="font-size:10px;color:#9ca3af;margin-top:3px;margin-right:4px">${time}</span>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  // auto reply
  setTimeout(()=>{
    const replies=["Sounds great! 😊","I was thinking the same thing!","Let me check and get back to you!","That's perfect! 🎵","Yes!! I'm so excited for it!"];
    const reply=replies[Math.floor(Math.random()*replies.length)];
    const t2=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    S.messages.push({me:false,text:reply,time:t2});
    const div2=document.createElement('div');
    div2.style.cssText='display:flex;flex-direction:column;align-items:flex-start';
    div2.innerHTML=`<div class="bthem">${reply}</div><span style="font-size:10px;color:#9ca3af;margin-top:3px;margin-left:4px">${t2}</span>`;
    msgs.appendChild(div2);
    msgs.scrollTop=msgs.scrollHeight;
  },1100);
}

function toggleMenu(){
  const m=document.getElementById('chat-menu');
  if(m) m.style.display=m.style.display==='none'?'block':'none';
}
function closeMenu(){
  const m=document.getElementById('chat-menu');
  if(m) m.style.display='none';
}

// Close menu on outside click
document.addEventListener('click',e=>{
  const menu=document.getElementById('chat-menu');
  const btn=document.getElementById('menu-btn');
  if(menu&&btn&&!btn.contains(e.target)) menu.style.display='none';
});

/* ─── BOOT ─── */
window._slide=0;
navigate('splash');
</script>
